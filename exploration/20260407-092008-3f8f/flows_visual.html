<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pathfinder — Unknown App — 20260407-092008-3f8f</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --border: #2a2a4a;
  --text: #e0e0e0;
  --text-dim: #888;
  --accent: #6c63ff;
  --accent2: #ff6b6b;
  --green: #4ecdc4;
  --orange: #ffa726;
}

body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-left { display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
.app-name { font-size: 16px; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 16px; }
.run-id { font-size: 12px; color: var(--text-dim); font-family: monospace; }
.meta { font-size: 12px; color: var(--text-dim); }

.layout {
  display: flex;
  height: calc(100vh - 52px);
}

nav#sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
}

.sidebar-section { margin-bottom: 24px; }
.sidebar-section h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 8px;
}

#flow-list { list-style: none; }
#flow-list li {
  padding: 8px 12px;
  margin-bottom: 4px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.15s;
}
#flow-list li:hover { background: var(--surface2); }
#flow-list li.active { background: var(--accent); color: white; }
#flow-list li .flow-category {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  background: var(--surface2);
  color: var(--text-dim);
}
#flow-list li.active .flow-category {
  background: rgba(255,255,255,0.2);
  color: white;
}

.nav-btn {
  width: 100%;
  padding: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.nav-btn:hover { background: var(--border); }

main#main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
}
#welcome h2 { font-size: 20px; font-weight: 400; margin-bottom: 8px; }
#welcome p { font-size: 14px; }

.hidden { display: none !important; }

/* Flow view */
.flow-header {
  margin-bottom: 24px;
}
.flow-header h2 { font-size: 22px; margin-bottom: 6px; }
.flow-meta {
  display: flex; gap: 16px;
  font-size: 12px; color: var(--text-dim);
}
.flow-meta .badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 500;
}
.badge-core { background: #2d5a3d; color: #4ecdc4; }
.badge-secondary { background: #3d3d2d; color: #ffa726; }
.badge-authentication { background: #3d2d2d; color: #ff6b6b; }
.badge-settings { background: #2d2d3d; color: #6c63ff; }
.badge-hypothetical { background: #3d3d2d; color: #ffa726; }
.badge-validated { background: #2d5a3d; color: #4ecdc4; }

.flow-conditions {
  margin: 12px 0;
  font-size: 13px;
  color: var(--text-dim);
}
.flow-conditions span { color: var(--text); }

/* Playback controls */
.playback-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border-radius: 8px;
  margin-bottom: 24px;
}
.playback-bar button {
  padding: 6px 16px;
  background: var(--accent);
  border: none;
  color: white;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
}
.playback-bar button:hover { opacity: 0.9; }
.playback-bar button.secondary {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
}
.playback-bar .step-indicator {
  font-size: 13px;
  color: var(--text-dim);
  margin-left: auto;
}
.speed-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
}

/* Step strip */
.step-strip {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding: 16px 0;
  align-items: flex-start;
}

.step-card {
  flex-shrink: 0;
  width: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: transform 0.2s, opacity 0.2s;
  opacity: 0.5;
}
.step-card.active {
  opacity: 1;
  transform: scale(1.05);
}
.step-card.visited { opacity: 0.85; }

.step-thumb {
  width: 200px;
  height: 140px;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: border-color 0.2s;
  background: var(--surface);
}
.step-card.active .step-thumb { border-color: var(--accent); }
.step-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.step-label {
  margin-top: 8px;
  text-align: center;
  font-size: 11px;
  max-width: 200px;
}
.step-label .step-num {
  font-weight: 600;
  color: var(--accent);
}
.step-label .step-intent {
  color: var(--text);
  margin-top: 2px;
}
.step-label .step-screen {
  color: var(--text-dim);
  font-size: 10px;
  margin-top: 2px;
}

.step-arrow {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 80px;
  padding-top: 50px;
}
.step-arrow .arrow-line {
  width: 60px;
  height: 2px;
  background: var(--border);
  position: relative;
}
.step-arrow .arrow-line::after {
  content: '';
  position: absolute;
  right: -1px;
  top: -4px;
  border: 5px solid transparent;
  border-left: 6px solid var(--border);
}
.step-arrow .arrow-label {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 4px;
  text-align: center;
  max-width: 80px;
  word-wrap: break-word;
}

/* Commentary panel */
.commentary {
  background: var(--surface);
  border-radius: 8px;
  padding: 20px;
  margin-top: 16px;
  min-height: 80px;
}
.commentary h4 {
  font-size: 13px;
  color: var(--accent);
  margin-bottom: 8px;
}
.commentary .commentary-text {
  font-size: 14px;
  line-height: 1.6;
}

/* Trace view */
.trace-table {
  width: 100%;
  border-collapse: collapse;
}
.trace-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
}
.trace-table td {
  padding: 8px 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.trace-table tr:hover { background: var(--surface2); }
.trace-thumb {
  width: 120px;
  height: 75px;
  border-radius: 4px;
  object-fit: cover;
  cursor: pointer;
  border: 1px solid var(--border);
}

/* Lightbox */
#lightbox {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: zoom-out;
}
#lightbox-img {
  max-width: 95%;
  max-height: 95%;
  border-radius: 8px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Pathfinder</h1>
    <span class="app-name">Unknown App</span>
  </div>
  <div class="header-right">
    <span class="run-id">20260407-092008-3f8f</span>
    <span class="meta">0 actions &middot; 0.0s</span>
  </div>
</header>

<div class="layout">
  <nav id="sidebar">
    <div class="sidebar-section">
      <h3>Flows</h3>
      <ul id="flow-list"></ul>
    </div>
    <div class="sidebar-section">
      <h3>Exploration Trace</h3>
      <button id="btn-trace" class="nav-btn">View full trace</button>
    </div>
  </nav>

  <main id="main-content">
    <div id="welcome">
      <h2>Select a flow from the sidebar</h2>
      <p>or view the full exploration trace</p>
    </div>
    <div id="flow-view" class="hidden"></div>
    <div id="trace-view" class="hidden"></div>
  </main>
</div>

<div id="lightbox" class="hidden" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Full screenshot">
</div>

<script>
const DATA = {"run_id": "20260407-092008-3f8f", "app_name": "Unknown App", "total_actions": 0, "duration": 0, "stop_reason": "", "screens": [], "transitions": [], "flows": [], "trace": [], "screenshots": {}};
let currentFlowIdx = -1;
let playbackTimer = null;
let playbackStep = 0;
let playbackSpeed = 2000; // ms per step

// --- Init ---
(function init() {
  const list = document.getElementById('flow-list');
  DATA.flows.forEach((flow, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `
      ${esc(flow.goal || 'Unnamed flow')}
      <span class="flow-category">${esc(flow.category || '?')}</span>
    `;
    li.onclick = () => selectFlow(idx);
    list.appendChild(li);
  });

  document.getElementById('btn-trace').onclick = showTrace;

  // If no flows, show trace by default
  if (DATA.flows.length === 0) {
    showTrace();
  }
})();

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// --- Flow selection ---
function selectFlow(idx) {
  stopPlayback();
  currentFlowIdx = idx;

  // Update sidebar
  document.querySelectorAll('#flow-list li').forEach((li, i) => {
    li.classList.toggle('active', i === idx);
  });

  const flow = DATA.flows[idx];
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('trace-view').classList.add('hidden');
  const view = document.getElementById('flow-view');
  view.classList.remove('hidden');

  // Build flow view
  view.innerHTML = buildFlowView(flow);

  // Activate first step
  playbackStep = 0;
  updateActiveStep();
}

function buildFlowView(flow) {
  const catClass = 'badge-' + (flow.category || 'core');
  const statusClass = 'badge-' + (flow.validation_status || 'hypothetical');

  let html = `
    <div class="flow-header">
      <h2>${esc(flow.goal)}</h2>
      <div class="flow-meta">
        <span class="badge ${catClass}">${esc(flow.category || 'core')}</span>
        <span class="badge ${statusClass}">${esc(flow.validation_status || 'hypothetical')}</span>
        <span>Importance: ${((flow.importance || 0.5) * 100).toFixed(0)}%</span>
        <span>Frequency: ${((flow.estimated_frequency || 0.5) * 100).toFixed(0)}%</span>
      </div>
    </div>
  `;

  if (flow.preconditions && flow.preconditions.length > 0) {
    html += `<div class="flow-conditions">
      Pre: <span>${flow.preconditions.map(esc).join(', ')}</span>
    </div>`;
  }
  if (flow.postconditions && flow.postconditions.length > 0) {
    html += `<div class="flow-conditions">
      Post: <span>${flow.postconditions.map(esc).join(', ')}</span>
    </div>`;
  }

  // Playback controls
  const steps = flow.semantic_steps || [];
  html += `
    <div class="playback-bar">
      <button onclick="startPlayback()">&#9654; Play</button>
      <button class="secondary" onclick="stopPlayback()">&#9724; Stop</button>
      <button class="secondary" onclick="prevStep()">&#9664; Prev</button>
      <button class="secondary" onclick="nextStep()">Next &#9654;</button>
      <select class="speed-select" onchange="playbackSpeed=parseInt(this.value)">
        <option value="3000">Slow</option>
        <option value="2000" selected>Normal</option>
        <option value="1000">Fast</option>
      </select>
      <span class="step-indicator" id="step-indicator">Step 1 / ${steps.length}</span>
    </div>
  `;

  // Step strip
  html += '<div class="step-strip" id="step-strip">';

  // Map semantic steps to trace steps and screenshots
  const concreteSteps = flow.concrete_steps || [];

  steps.forEach((step, i) => {
    if (i > 0) {
      // Arrow between steps
      const prevAction = getPrevAction(flow, i);
      html += `
        <div class="step-arrow">
          <div class="arrow-line"></div>
          <div class="arrow-label">${esc(prevAction)}</div>
        </div>
      `;
    }

    // Find matching screenshot
    const concreteStep = concreteSteps[i];
    const stepNum = concreteStep ? concreteStep.step_number : findBestTraceStep(step, i);
    const screenshot = DATA.screenshots[String(stepNum)] || null;

    html += `
      <div class="step-card" data-step="${i}" id="step-card-${i}">
        <div class="step-thumb" onclick="openLightbox('${stepNum}')">
          ${screenshot
            ? `<img src="${screenshot}" alt="Step ${step.step_number}">`
            : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:12px">No screenshot</div>`
          }
        </div>
        <div class="step-label">
          <div class="step-num">Step ${step.step_number}</div>
          <div class="step-intent">${esc(step.intent)}</div>
          <div class="step-screen">${esc(step.screen_context)}</div>
        </div>
      </div>
    `;
  });

  html += '</div>';

  // Commentary panel
  html += `
    <div class="commentary" id="commentary">
      <h4 id="commentary-title">Step 1</h4>
      <div class="commentary-text" id="commentary-text"></div>
    </div>
  `;

  return html;
}

function getPrevAction(flow, stepIdx) {
  // Try to get action from concrete steps
  const concrete = flow.concrete_steps;
  if (concrete && concrete[stepIdx - 1]) {
    const cs = concrete[stepIdx - 1];
    return cs.action_type + (cs.action_detail && cs.action_detail.target_text
      ? ': ' + cs.action_detail.target_text
      : '');
  }
  // Fall back to trace
  const steps = flow.semantic_steps || [];
  if (stepIdx > 0 && steps[stepIdx - 1]) {
    return steps[stepIdx - 1].expected_outcome || 'action';
  }
  return '';
}

function findBestTraceStep(semanticStep, index) {
  // Try to match semantic step to a trace step by screen context
  const ctx = (semanticStep.screen_context || '').toLowerCase();
  for (const ts of DATA.trace) {
    if (ts.screen && ts.screen.toLowerCase().includes(ctx.split(' ')[0])) {
      return ts.step;
    }
  }
  // Fallback: use index + 1
  return index + 1;
}

// --- Playback ---
function updateActiveStep() {
  const flow = DATA.flows[currentFlowIdx];
  if (!flow) return;
  const steps = flow.semantic_steps || [];
  if (steps.length === 0) return;

  // Clamp
  playbackStep = Math.max(0, Math.min(playbackStep, steps.length - 1));

  // Update cards
  document.querySelectorAll('.step-card').forEach((card, i) => {
    card.classList.toggle('active', i === playbackStep);
    card.classList.toggle('visited', i < playbackStep);
  });

  // Scroll into view
  const activeCard = document.getElementById('step-card-' + playbackStep);
  if (activeCard) {
    activeCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  // Update indicator
  const ind = document.getElementById('step-indicator');
  if (ind) ind.textContent = `Step ${playbackStep + 1} / ${steps.length}`;

  // Update commentary
  const step = steps[playbackStep];
  const title = document.getElementById('commentary-title');
  const text = document.getElementById('commentary-text');
  if (title && text && step) {
    title.textContent = `Step ${step.step_number}: ${step.intent}`;
    let commentary = `On the <strong>${esc(step.screen_context)}</strong>`;
    commentary += ` — ${esc(step.intent)}.`;
    if (step.expected_outcome) {
      commentary += ` Expected outcome: <em>${esc(step.expected_outcome)}</em>.`;
    }
    // Add concrete detail if available
    const concrete = (flow.concrete_steps || [])[playbackStep];
    if (concrete && concrete.action_type) {
      commentary += `<br><span style="color:var(--text-dim);font-size:12px">`;
      commentary += `Action: ${esc(concrete.action_type)}`;
      if (concrete.action_detail) {
        const detail = concrete.action_detail;
        if (detail.target_text) commentary += ` on "${esc(detail.target_text)}"`;
        if (detail.input_text) commentary += ` with text "${esc(detail.input_text)}"`;
      }
      commentary += `</span>`;
    }
    text.innerHTML = commentary;
  }
}

function startPlayback() {
  stopPlayback();
  playbackStep = 0;
  updateActiveStep();
  playbackTimer = setInterval(() => {
    const flow = DATA.flows[currentFlowIdx];
    const steps = flow ? flow.semantic_steps || [] : [];
    if (playbackStep < steps.length - 1) {
      playbackStep++;
      updateActiveStep();
    } else {
      stopPlayback();
    }
  }, playbackSpeed);
}

function stopPlayback() {
  if (playbackTimer) {
    clearInterval(playbackTimer);
    playbackTimer = null;
  }
}

function nextStep() {
  stopPlayback();
  playbackStep++;
  updateActiveStep();
}

function prevStep() {
  stopPlayback();
  playbackStep--;
  updateActiveStep();
}

// --- Trace view ---
function showTrace() {
  stopPlayback();
  currentFlowIdx = -1;
  document.querySelectorAll('#flow-list li').forEach(li => li.classList.remove('active'));
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('flow-view').classList.add('hidden');
  const view = document.getElementById('trace-view');
  view.classList.remove('hidden');

  let html = '<h2 style="margin-bottom:16px">Exploration Trace</h2>';
  html += '<table class="trace-table"><thead><tr>';
  html += '<th>#</th><th>Screenshot</th><th>Screen</th><th>Action</th><th>Goal</th>';
  html += '</tr></thead><tbody>';

  DATA.trace.forEach(step => {
    const screenshot = DATA.screenshots[String(step.step)] || null;
    html += `<tr>
      <td>${step.step}</td>
      <td>${screenshot
        ? `<img class="trace-thumb" src="${screenshot}" onclick="openLightbox('${step.step}')">`
        : '<span style="color:var(--text-dim)">—</span>'
      }</td>
      <td>${esc(step.screen || '')}</td>
      <td>${esc(step.action || '')}</td>
      <td>${esc(step.goal || '')}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  view.innerHTML = html;
}

// --- Lightbox ---
function openLightbox(stepNum) {
  const src = DATA.screenshots[String(stepNum)];
  if (!src) return;
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.remove('hidden');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowRight') nextStep();
  if (e.key === 'ArrowLeft') prevStep();
  if (e.key === ' ') { e.preventDefault(); playbackTimer ? stopPlayback() : startPlayback(); }
});

</script>
</body>
</html>
